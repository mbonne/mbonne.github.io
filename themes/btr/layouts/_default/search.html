{{ define "main" }}
<div class="container">
  <div class="page-content">
    <div id="search"></div>
  </div>
</div>
<link href="/pagefind/pagefind-ui.css" rel="stylesheet">
<style>
  #search {
    --pagefind-ui-scale: 1;
    --pagefind-ui-font: "CaskaydiaCove NF", "Cascadia Code", monospace;
    --pagefind-ui-primary: #bd93f9;
    --pagefind-ui-text: #f8f8f2;
    --pagefind-ui-background: #282a36;
    --pagefind-ui-border: #44475a;
    --pagefind-ui-tag: #44475a;
    --pagefind-ui-border-width: 1px;
    --pagefind-ui-border-radius: 4px;
    --pagefind-ui-image-border-radius: 4px;
  }
  .pagefind-ui__result-excerpt mark { background: #f1fa8c; color: #282a36; }
  .pagefind-ui__search-input {
    color: #f8f8f2 !important;
    background: #282a36 !important;
    border: 1px solid #44475a !important;
    border-radius: 4px !important;
    font-family: "CaskaydiaCove NF", "Cascadia Code", monospace !important;
    font-size: 0.9rem !important;
  }
  .pagefind-ui__search-input:focus {
    outline: none !important;
    border-color: #bd93f9 !important;
  }
  .pagefind-ui__search-clear {
    color: #6272a4 !important;
  }
  .pagefind-ui__search-clear:hover { color: #f8f8f2 !important; }
  .pagefind-ui__button {
    border: 1px solid #bd93f9 !important;
    background: none !important;
    color: #bd93f9 !important;
    border-radius: 4px !important;
    font-family: "CaskaydiaCove NF", "Cascadia Code", monospace !important;
    font-size: 0.9rem !important;
    padding: 0.45rem 1.2rem !important;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .pagefind-ui__button:hover { background: #bd93f9 !important; color: #282a36 !important; }
</style>
<script src="/pagefind/pagefind-ui.js" data-cfasync="false"></script>
<script data-cfasync="false">
  new PagefindUI({ element: "#search", showSubResults: true, highlightParam: "highlight" });
</script>
{{ end }}
