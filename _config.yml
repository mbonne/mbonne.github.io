###########################################################
# Build Test Run — buildtestrun.com
# Beautiful Jekyll remote theme configuration
###########################################################

title: Build Test Run
author: mbonne

remote_theme: daattali/beautiful-jekyll

############################
# Navigation
############################

navbar-links:
  About Me: "aboutme"

############################
# Identity
############################

avatar: "/assets/img/avatar-icon.png"
round-avatar: true

############################
# Social links (footer)
############################

social-network-links:
  email: "mbonne@buildtestrun.com"
  github: mbonne

############################
# General options
############################

url-pretty: "buildtestrun.com"
title-on-all-pages: true
excerpt_length: 50 # words
feed_show_excerpt: true
feed_show_tags: true
post_search: true
edit_page_button: false
remove-ads: true

site-css:
  - "/assets/css/custom.css"

share-links-active:
  twitter: false
  facebook: false
  linkedin: false
  vk: false

############################
# Dracula colour palette
# https://draculatheme.com/contribute
############################

page-col: "#282a36"
text-col: "#f8f8f2"
link-col: "#bd93f9"
hover-col: "#ff79c6"
navbar-col: "#1e1f29"
navbar-text-col: "#f8f8f2"
navbar-border-col: "#44475a"
footer-col: "#1e1f29"
footer-text-col: "#6272a4"
footer-link-col: "#f8f8f2"
footer-hover-col: "#bd93f9"

############################
# Build settings
############################

timezone: "Australia/Sydney"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 5 # number of posts per page
paginate_path: "/page:num/"

kramdown:
  input: GFM

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: false
      social-share: false
  - scope:
      path: ""
    values:
      layout: "page"

exclude:
  - CHANGELOG.md
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - docs/

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-remote-theme
